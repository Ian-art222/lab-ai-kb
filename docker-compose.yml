services:
  db:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    container_name: lab-ai-kb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lab_ai_kb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    cpus: "1.0"
    mem_limit: 2g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lab_ai_kb}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lab-ai-kb-api
    restart: unless-stopped
    # 需存在：首次启动请执行 `cp apps/api/.env.example apps/api/.env`（.gitignore 忽略 .env）
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-lab_ai_kb}
      APP_ENV: production
      UPLOAD_DIR: /app/data/uploads
      # 与浏览器访问前端的地址一致（唯一入口示例 http://10.65.218.208:8080）；换 IP/域名请改环境变量
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://10.65.218.208:8080,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    volumes:
      - api_uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    cpus: "2.0"
    mem_limit: 4g
    mem_reservation: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: lab-ai-kb-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  db_data:
  api_uploads:
